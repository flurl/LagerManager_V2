[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DJ",  # flake8-django
]
ignore = [
    "E501",   # line too long (formatter handles this)
    "DJ001",  # null=True on string fields — intentional, mirrors legacy schema with existing NULLs
]

[lint.per-file-ignores]
"*/migrations/*.py" = ["E501", "F401"]

[format]
quote-style = "double"
indent-style = "space"
