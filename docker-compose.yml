services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lagermanager
      POSTGRES_USER: lagermanager
      POSTGRES_PASSWORD: lagermanager
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lagermanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./lagermanager
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./lagermanager:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://lagermanager:lagermanager@db:5432/lagermanager
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
